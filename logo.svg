<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4cd7f6"/>
      <stop offset="100%" style="stop-color:#d0bcff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#131b2e"/>

  <!-- Subtle glow orb -->
  <circle cx="256" cy="256" r="160" fill="url(#gateGrad)" opacity="0.06"/>

  <!-- Stream lines left -->
  <rect x="64" y="218" width="88" height="5" rx="2.5" fill="url(#gateGrad)" opacity="0.7" filter="url(#glow)"/>
  <rect x="64" y="253" width="88" height="5" rx="2.5" fill="url(#gateGrad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="64" y="288" width="88" height="5" rx="2.5" fill="url(#gateGrad)" opacity="0.7" filter="url(#glow)"/>

  <!-- Stream lines right -->
  <rect x="360" y="218" width="88" height="5" rx="2.5" fill="url(#gateGrad)" opacity="0.7" filter="url(#glow)"/>
  <rect x="360" y="253" width="88" height="5" rx="2.5" fill="url(#gateGrad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="360" y="288" width="88" height="5" rx="2.5" fill="url(#gateGrad)" opacity="0.7" filter="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="108" fill="none" stroke="url(#gateGrad)" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="76" fill="none" stroke="url(#gateGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Gateway brackets -->
  <path d="M228 204 L194 256 L228 308" fill="none" stroke="url(#gateGrad)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M284 204 L318 256 L284 308" fill="none" stroke="url(#gateGrad)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Center node -->
  <circle cx="256" cy="256" r="12" fill="url(#gateGrad)" filter="url(#softGlow)"/>
  <circle cx="256" cy="256" r="6" fill="white" opacity="0.9"/>
</svg>
